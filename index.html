<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Drive Zone — Booking Rental Mobil Medan</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <!-- Firebase SDK -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, collection, getDocs, addDoc, doc, setDoc, orderBy, query } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    // ═══════════════════════════════════════════════════════════════════
    // FIREBASE CONFIGURATION - GANTI DENGAN DATA ANDA
    // ═══════════════════════════════════════════════════════════════════
    const firebaseConfig = {
      apiKey: "AIzaSyC1KOxK8QrlpZ_cuSXsUlnmKax-a0ts4vg",
      authDomain: "bookingdearma.firebaseapp.com",
      projectId: "bookingdearma",
      storageBucket: "bookingdearma.firebasestorage.app",
      messagingSenderId: "301525988368",
      appId: "1:301525988368:web:5be52a56f862cb26890695
    };

    const isFirebaseConfigured = !firebaseConfig.apiKey.includes('GANTI');
    let db = null;
    if (isFirebaseConfigured) {
      const app = initializeApp(firebaseConfig);
      db = getFirestore(app);
    }

    // ═══════════════════════════════════════════════════════════════════
    // CONFIG
    // ═══════════════════════════════════════════════════════════════════
    const WA_NUMBER = '62818520057'; // GANTI dengan nomor WA Anda
    const TRACKING_URL = 'tracking.html';

    let CARS = {};
    let selectedCar = '';
    let driverMode = 0;
    let lastBookingId = null;

    // ═══════════════════════════════════════════════════════════════════
    // DEFAULT CARS
    // ═══════════════════════════════════════════════════════════════════
    function loadDefaultCars() {
      CARS = {
        avanza: {id: 'avanza', label: 'New Avanza 2024', price: 350000, img: 'https://i.imgur.com/placeholder.png'},
        innova_reborn: {id: 'innova_reborn', label: 'Innova Reborn', price: 500000, img: ''},
        innova_zenix: {id: 'innova_zenix', label: 'Innova Zenix', price: 550000, img: ''},
        fortuner: {id: 'fortuner', label: 'Fortuner 2024', price: 750000, img: ''},
        pajero: {id: 'pajero', label: 'Pajero 2024', price: 800000, img: ''},
        alphard_2023: {id: 'alphard_2023', label: 'Alphard 2023', price: 1500000, img: ''},
        alphard_2025: {id: 'alphard_2025', label: 'New Alphard 2025', price: 1800000, img: ''},
        hiace_commuter: {id: 'hiace_commuter', label: 'Hiace Commuter', price: 900000, img: ''},
        hiace_premio: {id: 'hiace_premio', label: 'Hiace Premio', price: 1100000, img: ''},
      };
    }

    async function loadCars() {
      if (!isFirebaseConfigured || !db) {
        document.getElementById('loadingState').classList.add('hidden');
        document.getElementById('errorMsg').innerHTML = `<strong>⚠️ Firebase Belum Dikonfigurasi</strong><br><small>Edit file index.html dan isi Firebase Config Anda</small>`;
        document.getElementById('errorMsg').classList.remove('hidden');
        loadDefaultCars();
        selectedCar = Object.keys(CARS)[0];
        renderCarGrid();
        document.getElementById('bForm').classList.remove('hidden');
        return;
      }
      try {
        const q = query(collection(db, 'cars'), orderBy('price'));
        const snap = await getDocs(q);
        if (!snap.empty) {
          CARS = {};
          snap.forEach(d => { CARS[d.id] = { id: d.id, ...d.data() }; });
        } else {
          loadDefaultCars();
        }
        selectedCar = Object.keys(CARS)[0];
        renderCarGrid();
        document.getElementById('loadingState').classList.add('hidden');
        document.getElementById('bForm').classList.remove('hidden');
      } catch (err) {
        console.error(err);
        loadDefaultCars();
        selectedCar = Object.keys(CARS)[0];
        renderCarGrid();
        document.getElementById('loadingState').classList.add('hidden');
        document.getElementById('bForm').classList.remove('hidden');
      }
    }

    function renderCarGrid() {
      const grid = document.getElementById('carGrid');
      grid.innerHTML = Object.entries(CARS).map(([key, car], idx) => `
        <label class="car-card ${idx===0?'selected':''}" onclick="selCar(this, '${key}')">
          <input type="radio" name="car" value="${key}" ${idx===0?'checked':''}>
          ${car.img ? `<img src="${car.img}" alt="${car.label}" class="car-img" onerror="this.style.display='none'">` : `<div class="car-img-placeholder">🚗</div>`}
          <div class="car-name">${car.label}</div>
          <div class="car-price">${fmt(car.price)}/hari</div>
        </label>
      `).join('');
    }

    window.selCar = function(el, carKey) {
      document.querySelectorAll('.car-card').forEach(c => c.classList.remove('selected'));
      el.classList.add('selected');
      selectedCar = carKey;
      calcEst();
    };

    window.togDriver = function(m) {
      driverMode = m;
      document.getElementById('bD0').classList.toggle('active', m === 0);
      document.getElementById('bD1').classList.toggle('active', m === 1);
      calcEst();
    };

    window.toggleAlamat = function() {
      const lokasi = document.getElementById('fLok').value;
      const alamatField = document.getElementById('alamatField');
      const fAlamat = document.getElementById('fAlamat');
      if (lokasi === 'Kota Medan') {
        alamatField.classList.remove('hidden');
        fAlamat.required = true;
      } else {
        alamatField.classList.add('hidden');
        fAlamat.required = false;
        fAlamat.value = '';
      }
    };

    window.calcEst = function() {
      const s = document.getElementById('fStart').value;
      const e = document.getElementById('fEnd').value;
      if (!s || !e) return;
      const days = Math.ceil((new Date(e+'T00:00:00') - new Date(s+'T00:00:00')) / 86400000) + 1;
      if (days <= 0) return;
      const car = CARS[selectedCar];
      const total = car.price * days;
      document.getElementById('estBox').classList.remove('hidden');
      document.getElementById('estTxt').textContent = fmt(total);
      document.getElementById('estDetail').textContent = `${days} hari × ${fmt(car.price)}/hari = ${fmt(total)}`;
    };

    document.getElementById('bForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      const btnText = document.getElementById('btnText');
      btn.disabled = true;
      btnText.textContent = '⏳ Menyimpan...';

      const s = document.getElementById('fStart').value;
      const en = document.getElementById('fEnd').value;
      const days = Math.ceil((new Date(en+'T00:00:00') - new Date(s+'T00:00:00')) / 86400000) + 1;

      if (days <= 0) {
        alert('Tanggal pengembalian harus sama atau setelah tanggal penjemputan!');
        btn.disabled = false;
        btnText.textContent = '🚀 PESAN SEKARANG → KIRIM KE WHATSAPP';
        return;
      }

      const car = CARS[selectedCar];
      const lokasi = document.getElementById('fLok').value;
      const alamat = document.getElementById('fAlamat').value;
      const lokasiLengkap = lokasi === 'Kota Medan' && alamat ? `${lokasi} - ${alamat}` : lokasi;

      const n = new Date();
      const bookingId = `DZ${n.getFullYear()}${String(n.getMonth()+1).padStart(2,'0')}-${Math.random().toString(36).substr(2,6).toUpperCase()}`;

      const bookingData = {
        id: bookingId,
        nama: document.getElementById('fNama').value,
        wa: document.getElementById('fWa').value,
        email: document.getElementById('fEmail').value || null,
        ktp: document.getElementById('fKtp').value || null,
        car: selectedCar,
        car_label: car.label,
        with_driver: driverMode === 0,
        start_date: s,
        end_date: en,
        waktu: document.getElementById('fWkt').value,
        lokasi: lokasiLengkap,
        catatan: document.getElementById('fCt').value || '-',
        days: days,
        car_price: car.price,
        total_price: car.price * days,
        status: 'pending',
        payment_status: 'unpaid',
        driver_name: null,
        driver_phone: null,
        vehicle_plate: null,
        payment_method: null,
        invoice_url: null,
        tipe_pesanan: 'rental',
        car_photos: [],
        created_at: new Date().toISOString()
      };

      try {
        if (isFirebaseConfigured && db) {
          await setDoc(doc(db, 'bookings', bookingId), bookingData);
        }
        lastBookingId = bookingId;

        const link = `${window.location.origin}${window.location.pathname.replace('index.html','')}${TRACKING_URL}?id=${bookingId}`;
        const msg = `🚗 *BOOKING BARU — Drive Zone*\n━━━━━━━━━━━━━━━━━━━━━\n🔖 *ID Pesanan: ${bookingId}*\n\n👤 *DATA PENYEWA*\n• Nama        : ${bookingData.nama}\n• No. WA      : ${bookingData.wa}\n• Email       : ${bookingData.email || '-'}\n• No. KTP/SIM : ${bookingData.ktp || '-'}\n\n🚙 *KENDARAAN*\n• Mobil       : ${bookingData.car_label}\n• Pengemudi   : ${driverMode===0?'Dengan Supir (Gratis)':'Lepas Kunci (Mandiri)'}\n\n📅 *DETAIL SEWA*\n• Penjemputan : ${fmtD(s)} pukul ${bookingData.waktu}\n• Pengembalian: ${fmtD(en)}\n• Durasi      : ${days} hari\n• Lokasi      : ${lokasiLengkap}\n\n💰 *ESTIMASI BIAYA*\n• Sewa        : ${fmt(car.price)} × ${days} hari = ${fmt(car.price * days)}\n• *TOTAL      : ${fmt(car.price * days)}*\n\n📝 *CATATAN*\n${bookingData.catatan}\n\n🔗 *Link Tracking:*\n${link}\n━━━━━━━━━━━━━━━━━━━━━`;

        window.open(`https://wa.me/${WA_NUMBER}?text=${encodeURIComponent(msg)}`, '_blank');
        document.getElementById('oId').textContent = bookingId;
        document.getElementById('overlay').classList.add('show');
        e.target.reset();
        renderCarGrid();
        driverMode = 0;
        document.getElementById('bD0').classList.add('active');
        document.getElementById('bD1').classList.remove('active');
        document.getElementById('estBox').classList.add('hidden');
        document.getElementById('alamatField').classList.add('hidden');
      } catch (err) {
        console.error(err);
        alert('Gagal menyimpan ke database: ' + err.message + '\n\nTapi pesanan tetap terkirim ke WhatsApp!');
      } finally {
        btn.disabled = false;
        btnText.textContent = '🚀 PESAN SEKARANG → KIRIM KE WHATSAPP';
      }
    });

    window.copyLink = function() {
      if (!lastBookingId) return;
      const link = `${window.location.origin}${window.location.pathname.replace('index.html','')}${TRACKING_URL}?id=${lastBookingId}`;
      navigator.clipboard.writeText(link).then(() => {
        document.getElementById('oCopy').textContent = '✓ Link Berhasil Disalin!';
      });
    };

    window.goTrack = function() {
      if (!lastBookingId) return;
      window.location.href = `${TRACKING_URL}?id=${lastBookingId}`;
    };

    window.closeOverlay = function() {
      document.getElementById('overlay').classList.remove('show');
      document.getElementById('oCopy').textContent = '📋 Salin Link Tracking Pesanan';
    };

    const fmt = n => 'Rp ' + Number(n).toLocaleString('id-ID');
    const fmtD = v => {
      if (!v) return '-';
      return new Date(v+'T00:00:00').toLocaleDateString('id-ID', {weekday:'long', day:'numeric', month:'long', year:'numeric'});
    };

    const today = new Date().toISOString().split('T')[0];
    document.getElementById('fStart').min = today;
    document.getElementById('fEnd').min = today;

    loadCars();
  </script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#0d0d0d;--surface:#161616;--card:#1e1e1e;
      --accent:#f0c040;--accent2:#e05a00;--text:#f5f5f5;--muted:#888;--border:#2e2e2e;
      --green:#22c55e;--red:#ef4444;--blue:#3b82f6;--orange:#f97316;
    }
    body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh}
    .hidden{display:none!important}

    .topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 24px;
      display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
    .topbar-brand{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:3px;
      background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;
      -webkit-text-fill-color:transparent;background-clip:text}
    .topbar-tag{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);
      background:rgba(240,192,64,.08);border:1px solid var(--border);border-radius:6px;padding:4px 10px}

    .hero{background:linear-gradient(135deg,#0d0d0d 40%,#1a0f00 100%);
      padding:52px 24px 0;text-align:center;position:relative;overflow:hidden}
    .brand-xl{font-family:'Bebas Neue',sans-serif;font-size:clamp(52px,11vw,90px);letter-spacing:6px;line-height:1;
      background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;
      -webkit-text-fill-color:transparent;background-clip:text;animation:fadeUp .7s ease both}
    .hero-sub{color:var(--muted);font-size:13px;letter-spacing:4px;text-transform:uppercase;margin-top:6px;animation:fadeUp .7s .1s ease both}

    .form-wrap{max-width:720px;margin:-20px auto 60px;padding:0 16px;animation:fadeUp .8s .3s ease both}
    .card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:28px}
    .card-accent::before{content:'';display:block;height:3px;background:linear-gradient(90deg,var(--accent),var(--accent2));
      border-radius:16px 16px 0 0;margin:-28px -28px 22px}

    .field{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
    .field-label{font-size:11px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--muted)}
    input,select,textarea{background:var(--surface);border:1px solid var(--border);border-radius:10px;
      color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;padding:11px 14px;
      transition:border-color .2s,box-shadow .2s;width:100%;outline:none}
    input:focus,select:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(240,192,64,.1)}
    select option{background:#1e1e1e}
    textarea{resize:vertical;min-height:70px}
    .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px}

    .section-head{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:3px;color:var(--accent);
      display:flex;align-items:center;gap:10px;margin-bottom:16px}
    .section-head::after{content:'';flex:1;height:1px;background:var(--border)}

    .car-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:14px}
    @media(min-width:640px){.car-grid{grid-template-columns:repeat(3,1fr)}}
    .car-card{background:var(--surface);border:2px solid var(--border);border-radius:12px;
      padding:12px 8px;text-align:center;cursor:pointer;transition:all .2s;overflow:hidden}
    .car-card:hover{border-color:var(--muted);transform:translateY(-2px)}
    .car-card.selected{border-color:var(--accent);background:rgba(240,192,64,.05)}
    .car-card input[type=radio]{display:none}
    .car-img{width:100%;height:80px;object-fit:contain;margin-bottom:8px;border-radius:6px}
    .car-img-placeholder{width:100%;height:80px;display:flex;align-items:center;justify-content:center;font-size:36px;margin-bottom:8px}
    .car-name{font-size:11px;font-weight:600;letter-spacing:1px;line-height:1.3}
    .car-price{font-size:11px;color:var(--accent);margin-top:4px}

    .toggle-row{display:flex;gap:10px}
    .toggle-btn{flex:1;background:var(--surface);border:2px solid var(--border);border-radius:10px;
      color:var(--muted);cursor:pointer;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;
      padding:12px 8px;transition:all .2s;line-height:1.5;text-align:center}
    .toggle-btn.active{border-color:var(--accent);color:var(--accent);background:rgba(240,192,64,.07)}

    .summary-box{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 18px;margin-bottom:14px}

    .btn-xl{background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:12px;
      color:#000;cursor:pointer;font-family:'Bebas Neue',sans-serif;font-size:19px;letter-spacing:3px;
      padding:16px;width:100%;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px}
    .btn-xl:hover{opacity:.9;transform:translateY(-2px)}
    .btn-xl:disabled{opacity:.5;cursor:not-allowed}

    hr.div{border:none;border-top:1px solid var(--border);margin:20px 0}

    .overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.93);z-index:999;
      align-items:center;justify-content:center;padding:20px}
    .overlay.show{display:flex}
    .success-box{background:var(--card);border:1px solid var(--accent);border-radius:20px;
      padding:36px 28px;text-align:center;max-width:420px;width:100%}
    .btn{border:none;border-radius:10px;cursor:pointer;font-family:'DM Sans',sans-serif;
      font-size:13px;font-weight:600;padding:10px 20px;transition:all .2s}
    .btn:hover{opacity:.88;transform:translateY(-1px)}
    .btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#000}
    .btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted)}
    .btn-outline:hover{border-color:var(--accent);color:var(--accent);opacity:1}
    .w-full{width:100%}

    .loading{display:flex;align-items:center;justify-content:center;padding:40px}
    .loading-spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 1s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

    .alert-error{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);border-radius:10px;
      color:var(--red);padding:12px 16px;margin-bottom:16px;font-size:13px}

    .est-box{background:linear-gradient(135deg,rgba(240,192,64,.08),rgba(224,90,0,.05));
      border:1px solid rgba(240,192,64,.25);border-radius:12px;padding:14px 18px;margin-bottom:14px}
    .est-total{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:2px;color:var(--accent)}
    .est-detail{font-size:12px;color:var(--muted);margin-top:2px}
  </style>
</head>
<body>

<div class="topbar">
  <div class="topbar-brand">DRIVE ZONE</div>
  <div class="topbar-tag">MEDAN</div>
</div>

<div class="hero">
  <div class="brand-xl">DRIVE ZONE</div>
  <div class="hero-sub">Rental Mobil Premium Medan • Armada Terbaik</div>
  <div style="height:60px"></div>
</div>

<div class="form-wrap">
  <div class="card card-accent">

    <div id="loadingState" class="loading">
      <div class="loading-spinner"></div>
    </div>
    <div id="errorMsg" class="alert-error hidden"></div>

    <form id="bForm" class="hidden">
      <div class="section-head">🚙 Pilih Kendaraan</div>
      <div class="car-grid" id="carGrid"></div>

      <div class="section-head">🧑‍✈️ Tipe Pengemudi</div>
      <div class="toggle-row" style="margin-bottom:20px">
        <button type="button" class="toggle-btn active" id="bD0" onclick="togDriver(0)">🧑‍✈️ Dengan Supir<br><small>Gratis</small></button>
        <button type="button" class="toggle-btn" id="bD1" onclick="togDriver(1)">🔑 Lepas Kunci<br><small>Mandiri</small></button>
      </div>

      <div class="section-head">👤 Data Penyewa</div>
      <div class="grid-2">
        <div class="field">
          <label class="field-label">Nama Lengkap *</label>
          <input id="fNama" type="text" placeholder="Nama sesuai KTP" required>
        </div>
        <div class="field">
          <label class="field-label">No. WhatsApp *</label>
          <input id="fWa" type="tel" placeholder="08xxxxxxxxxx" required>
        </div>
        <div class="field">
          <label class="field-label">Email</label>
          <input id="fEmail" type="email" placeholder="email@example.com">
        </div>
        <div class="field">
          <label class="field-label">No. KTP / SIM</label>
          <input id="fKtp" type="text" placeholder="Nomor identitas">
        </div>
      </div>

      <div class="section-head">📅 Detail Sewa</div>
      <div class="grid-2">
        <div class="field">
          <label class="field-label">Tanggal Penjemputan *</label>
          <input id="fStart" type="date" required onchange="calcEst()">
        </div>
        <div class="field">
          <label class="field-label">Tanggal Pengembalian *</label>
          <input id="fEnd" type="date" required onchange="calcEst()">
        </div>
        <div class="field">
          <label class="field-label">Jam Penjemputan *</label>
          <input id="fWkt" type="time" required>
        </div>
        <div class="field">
          <label class="field-label">Lokasi *</label>
          <select id="fLok" required onchange="toggleAlamat()">
            <option value="">Pilih Lokasi...</option>
            <option>Kota Medan</option>
            <option>Bandara Kualanamu</option>
            <option>Pelabuhan Belawan</option>
            <option>Stasiun Medan</option>
            <option>Luar Kota</option>
          </select>
        </div>
      </div>
      <div class="field hidden" id="alamatField">
        <label class="field-label">Alamat Lengkap *</label>
        <input id="fAlamat" type="text" placeholder="Nama jalan, No. rumah, Kelurahan">
      </div>
      <div class="field">
        <label class="field-label">Catatan Tambahan</label>
        <textarea id="fCt" placeholder="Permintaan khusus, lokasi detail, dll..."></textarea>
      </div>

      <div id="estBox" class="est-box hidden">
        <div style="font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:4px">Estimasi Total</div>
        <div class="est-total" id="estTxt">Rp 0</div>
        <div class="est-detail" id="estDetail"></div>
      </div>

      <button type="submit" class="btn-xl" id="submitBtn">
        <span id="btnText">🚀 PESAN SEKARANG → KIRIM KE WHATSAPP</span>
      </button>
    </form>
  </div>
</div>

<!-- Success Overlay -->
<div class="overlay" id="overlay">
  <div class="success-box">
    <div style="font-size:52px;margin-bottom:14px">🎉</div>
    <div style="font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:3px;color:var(--accent);margin-bottom:4px">PESANAN TERKIRIM!</div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:18px">Pesanan Anda telah dikirim via WhatsApp</div>
    <div style="background:var(--surface);border-radius:10px;padding:12px;margin-bottom:18px">
      <div style="font-size:10px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:4px">ID Pesanan</div>
      <div id="oId" style="font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:3px;color:var(--accent)"></div>

</div>
