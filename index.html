<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Drive Zone — Booking Rental Mobil Medan</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#0d0d0d;--surface:#161616;--card:#1e1e1e;
      --accent:#f0c040;--accent2:#e05a00;--text:#f5f5f5;--muted:#888;--border:#2e2e2e;
      --green:#22c55e;--red:#ef4444;--blue:#3b82f6;--orange:#f97316;
    }
    body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh}
    .hidden{display:none!important}
    .topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
    .topbar-brand{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:3px;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .topbar-tag{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);background:rgba(240,192,64,.08);border:1px solid var(--border);border-radius:6px;padding:4px 10px}
    .hero{background:linear-gradient(135deg,#0d0d0d 40%,#1a0f00 100%);padding:52px 24px 0;text-align:center}
    .brand-xl{font-family:'Bebas Neue',sans-serif;font-size:clamp(52px,11vw,90px);letter-spacing:6px;line-height:1;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:fadeUp .7s ease both}
    .hero-sub{color:var(--muted);font-size:13px;letter-spacing:4px;text-transform:uppercase;margin-top:6px;animation:fadeUp .7s .1s ease both}
    .form-wrap{max-width:720px;margin:-20px auto 60px;padding:0 16px;animation:fadeUp .8s .3s ease both}
    .card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:28px}
    .card-accent::before{content:'';display:block;height:3px;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:16px 16px 0 0;margin:-28px -28px 22px}
    .field{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
    .field-label{font-size:11px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--muted)}
    input,select,textarea{background:var(--surface);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;padding:11px 14px;transition:border-color .2s,box-shadow .2s;width:100%;outline:none}
    input:focus,select:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(240,192,64,.1)}
    select option{background:#1e1e1e}
    textarea{resize:vertical;min-height:70px}
    .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
    @media(max-width:500px){.grid-2{grid-template-columns:1fr}}
    .section-head{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:3px;color:var(--accent);display:flex;align-items:center;gap:10px;margin-bottom:16px}
    .section-head::after{content:'';flex:1;height:1px;background:var(--border)}
    .car-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:14px}
    @media(min-width:640px){.car-grid{grid-template-columns:repeat(3,1fr)}}
    .car-card{background:var(--surface);border:2px solid var(--border);border-radius:12px;padding:12px 8px;text-align:center;cursor:pointer;transition:all .2s}
    .car-card:hover{border-color:var(--muted);transform:translateY(-2px)}
    .car-card.selected{border-color:var(--accent);background:rgba(240,192,64,.05)}
    .car-card input[type=radio]{display:none}
    .car-img{width:100%;height:80px;object-fit:contain;margin-bottom:8px;border-radius:6px}
    .car-emo{width:100%;height:80px;display:flex;align-items:center;justify-content:center;font-size:36px;margin-bottom:8px}
    .car-name{font-size:11px;font-weight:600;letter-spacing:1px;line-height:1.3}
    .car-price{font-size:11px;color:var(--accent);margin-top:4px}
    .toggle-row{display:flex;gap:10px}
    .toggle-btn{flex:1;background:var(--surface);border:2px solid var(--border);border-radius:10px;color:var(--muted);cursor:pointer;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;padding:12px 8px;transition:all .2s;line-height:1.5;text-align:center}
    .toggle-btn.active{border-color:var(--accent);color:var(--accent);background:rgba(240,192,64,.07)}
    .btn-xl{background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:12px;color:#000;cursor:pointer;font-family:'Bebas Neue',sans-serif;font-size:19px;letter-spacing:3px;padding:16px;width:100%;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px}
    .btn-xl:hover{opacity:.9;transform:translateY(-2px)}
    .btn-xl:disabled{opacity:.5;cursor:not-allowed}
    .btn{border:none;border-radius:10px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;padding:10px 20px;transition:all .2s}
    .btn:hover{opacity:.88;transform:translateY(-1px)}
    .btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#000}
    .btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted)}
    .btn-outline:hover{border-color:var(--accent);color:var(--accent);opacity:1}
    .w-full{width:100%}
    .alert-warning{background:rgba(249,115,22,.1);border:1px solid rgba(249,115,22,.25);border-radius:10px;color:var(--orange);padding:12px 16px;margin-bottom:16px;font-size:13px;line-height:1.5}
    .est-box{background:linear-gradient(135deg,rgba(240,192,64,.08),rgba(224,90,0,.05));border:1px solid rgba(240,192,64,.25);border-radius:12px;padding:14px 18px;margin-bottom:14px}
    .est-total{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:2px;color:var(--accent)}
    .est-detail{font-size:12px;color:var(--muted);margin-top:2px}
    .overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.93);z-index:999;align-items:center;justify-content:center;padding:20px}
    .overlay.show{display:flex}
    .success-box{background:var(--card);border:1px solid var(--accent);border-radius:20px;padding:36px 28px;text-align:center;max-width:420px;width:100%}
    @keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
  </style>
</head>
<body>

<div class="topbar">
  <div class="topbar-brand">DRIVE ZONE</div>
  <div class="topbar-tag">MEDAN</div>
</div>

<div class="hero">
  <div class="brand-xl">DRIVE ZONE</div>
  <div class="hero-sub">Rental Mobil Premium Medan • Armada Terbaik</div>
  <div style="height:60px"></div>
</div>

<div class="form-wrap">
  <div class="card card-accent">

    <div id="warnMsg" class="alert-warning hidden"></div>

    <form id="bForm">
      <div class="section-head">🚙 Pilih Kendaraan</div>
      <div class="car-grid" id="carGrid"></div>

      <div class="section-head">🧑‍✈️ Tipe Pengemudi</div>
      <div class="toggle-row" style="margin-bottom:20px">
        <button type="button" class="toggle-btn active" id="bD0" onclick="togDriver(0)">🧑‍✈️ Dengan Supir<br><small>Gratis</small></button>
        <button type="button" class="toggle-btn" id="bD1" onclick="togDriver(1)">🔑 Lepas Kunci<br><small>Mandiri</small></button>
      </div>

      <div class="section-head">👤 Data Penyewa</div>
      <div class="grid-2">
        <div class="field"><label class="field-label">Nama Lengkap *</label><input id="fNama" type="text" placeholder="Nama sesuai KTP" required></div>
        <div class="field"><label class="field-label">No. WhatsApp *</label><input id="fWa" type="tel" placeholder="08xxxxxxxxxx" required></div>
        <div class="field"><label class="field-label">Email</label><input id="fEmail" type="email" placeholder="email@example.com"></div>
        <div class="field"><label class="field-label">No. KTP / SIM</label><input id="fKtp" type="text" placeholder="Nomor identitas"></div>
      </div>

      <div class="section-head">📅 Detail Sewa</div>
      <div class="grid-2">
        <div class="field"><label class="field-label">Tanggal Penjemputan *</label><input id="fStart" type="date" required onchange="calcEst()"></div>
        <div class="field"><label class="field-label">Tanggal Pengembalian *</label><input id="fEnd" type="date" required onchange="calcEst()"></div>
        <div class="field"><label class="field-label">Jam Penjemputan *</label><input id="fWkt" type="time" required></div>
        <div class="field">
          <label class="field-label">Lokasi *</label>
          <select id="fLok" required onchange="toggleAlamat()">
            <option value="">Pilih Lokasi...</option>
            <option>Kota Medan</option>
            <option>Bandara Kualanamu</option>
            <option>Pelabuhan Belawan</option>
            <option>Stasiun Medan</option>
            <option>Luar Kota</option>
          </select>
        </div>
      </div>
      <div class="field hidden" id="alamatField">
        <label class="field-label">Alamat Lengkap *</label>
        <input id="fAlamat" type="text" placeholder="Nama jalan, No. rumah, Kelurahan">
      </div>
      <div class="field">
        <label class="field-label">Catatan Tambahan</label>
        <textarea id="fCt" placeholder="Permintaan khusus, lokasi detail, dll..."></textarea>
      </div>

      <div id="estBox" class="est-box hidden">
        <div style="font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:4px">Estimasi Total</div>
        <div class="est-total" id="estTxt">Rp 0</div>
        <div class="est-detail" id="estDetail"></div>
      </div>

      <button type="submit" class="btn-xl" id="submitBtn">
        <span id="btnText">🚀 PESAN SEKARANG → KIRIM KE WHATSAPP</span>
      </button>
    </form>
  </div>
</div>

<div class="overlay" id="overlay">
  <div class="success-box">
    <div style="font-size:52px;margin-bottom:14px">🎉</div>
    <div style="font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:3px;color:var(--accent);margin-bottom:4px">PESANAN TERKIRIM!</div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:18px">Pesanan Anda telah dikirim via WhatsApp</div>
    <div style="background:var(--surface);border-radius:10px;padding:12px;margin-bottom:18px">
      <div style="font-size:10px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:4px">ID Pesanan</div>
      <div id="oId" style="font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:3px;color:var(--accent)"></div>
    </div>
    <button id="oCopy" class="btn btn-outline w-full" style="margin-bottom:8px" onclick="copyLink()">📋 Salin Link Tracking</button>
    <button class="btn btn-primary w-full" onclick="goTrack()">🔍 Lihat Status Pesanan</button>
    <button class="btn btn-outline w-full" style="margin-top:8px;font-size:12px" onclick="closeOverlay()">Buat Pesanan Baru</button>
  </div>
</div>

<!-- Firebase Compat SDK (tidak butuh import/module) -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
// ════════════════════════════════════════════════
// 🔥 FIREBASE CONFIG — GANTI DENGAN DATA ANDA
// ════════════════════════════════════════════════
var firebaseConfig = {
      apiKey: "AIzaSyC1KOxK8QrlpZ_cuSXsUlnmKax-a0ts4vg",
      authDomain: "bookingdearma.firebaseapp.com",
      projectId: "bookingdearma",
      storageBucket: "bookingdearma.firebasestorage.app",
      messagingSenderId: "301525988368",
      appId: "1:301525988368:web:5be52a56f862cb26890695
    };

// ════════════════════════════════════════════════
// ⚙️ CONFIG BISNIS — GANTI INI
// ════════════════════════════════════════════════
var WA_NUMBER    = '62818520057'; // Nomor WA Anda (format 628xxx)
var TRACKING_URL = 'tracking.html';

// ════════════════════════════════════════════════
// DATA MOBIL DEFAULT
// ════════════════════════════════════════════════
var DEFAULT_CARS = {
  avanza:         {id:'avanza',         label:'New Avanza 2024',  price:350000 },
  innova_reborn:  {id:'innova_reborn',  label:'Innova Reborn',    price:500000 },
  innova_zenix:   {id:'innova_zenix',   label:'Innova Zenix',     price:550000 },
  fortuner:       {id:'fortuner',       label:'Fortuner 2024',    price:750000 },
  pajero:         {id:'pajero',         label:'Pajero 2024',      price:800000 },
  alphard_2023:   {id:'alphard_2023',   label:'Alphard 2023',     price:1500000},
  alphard_2025:   {id:'alphard_2025',   label:'New Alphard 2025', price:1800000},
  hiace_commuter: {id:'hiace_commuter', label:'Hiace Commuter',   price:900000 },
  hiace_premio:   {id:'hiace_premio',   label:'Hiace Premio',     price:1100000},
};

// ════════════════════════════════════════════════
// STATE
// ════════════════════════════════════════════════
var CARS = Object.assign({}, DEFAULT_CARS);
var selectedCar   = Object.keys(CARS)[0];
var driverMode    = 0;
var lastBookingId = null;
var db            = null;

// ════════════════════════════════════════════════
// TAMPILKAN FORM LANGSUNG — tanpa tunggu Firebase
// ════════════════════════════════════════════════
renderCarGrid();

// Set min date
var today = new Date().toISOString().split('T')[0];
document.getElementById('fStart').min = today;
document.getElementById('fEnd').min   = today;

// ════════════════════════════════════════════════
// INIT FIREBASE DI BACKGROUND (tidak blok UI)
// ════════════════════════════════════════════════
var isConfigured = firebaseConfig.apiKey !== 'GANTI_API_KEY';

if (isConfigured) {
  try {
    firebase.initializeApp(firebaseConfig);
    db = firebase.firestore();
    // Update grid mobil dari Firestore (background)
    db.collection('cars').orderBy('price').get()
      .then(function(snap) {
        if (!snap.empty) {
          CARS = {};
          snap.forEach(function(d) { CARS[d.id] = Object.assign({id: d.id}, d.data()); });
          selectedCar = Object.keys(CARS)[0];
          renderCarGrid();
        }
      })
      .catch(function(e) { console.warn('Firestore cars:', e); });
  } catch(e) {
    console.error('Firebase init:', e);
  }
} else {
  var w = document.getElementById('warnMsg');
  w.innerHTML = '⚠️ Firebase belum dikonfigurasi. Pesanan hanya dikirim via WhatsApp. Ikuti <strong>SETUP.md</strong>.';
  w.classList.remove('hidden');
}

// ════════════════════════════════════════════════
// HELPERS
// ════════════════════════════════════════════════
function fmt(n)  { return 'Rp ' + Number(n).toLocaleString('id-ID'); }
function fmtD(v) {
  if (!v) return '-';
  return new Date(v+'T00:00:00').toLocaleDateString('id-ID',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
}
function trackLink(id) {
  var base = window.location.href.replace(/[^\/]*$/, '');
  return base + TRACKING_URL + '?id=' + id;
}

// ════════════════════════════════════════════════
// RENDER GRID MOBIL
// ════════════════════════════════════════════════
function renderCarGrid() {
  var keys = Object.keys(CARS);
  document.getElementById('carGrid').innerHTML = keys.map(function(key, i) {
    var car = CARS[key];
    return '<label class="car-card ' + (i===0?'selected':'') + '" onclick="selCar(this,\'' + key + '\')">'
      + '<input type="radio" name="car" value="' + key + '" ' + (i===0?'checked':'') + '>'
      + (car.img ? '<img src="' + car.img + '" alt="' + car.label + '" class="car-img" onerror="this.style.display=\'none\'">' : '<div class="car-emo">🚗</div>')
      + '<div class="car-name">' + car.label + '</div>'
      + '<div class="car-price">' + fmt(car.price) + '/hari</div>'
      + '</label>';
  }).join('');
}

// ════════════════════════════════════════════════
// EVENT HANDLERS
// ════════════════════════════════════════════════
function selCar(el, k) {
  document.querySelectorAll('.car-card').forEach(function(c){ c.classList.remove('selected'); });
  el.classList.add('selected');
  selectedCar = k;
  calcEst();
}

function togDriver(m) {
  driverMode = m;
  document.getElementById('bD0').classList.toggle('active', m===0);
  document.getElementById('bD1').classList.toggle('active', m===1);
}

function toggleAlamat() {
  var lok  = document.getElementById('fLok').value;
  var wrap = document.getElementById('alamatField');
  var inp  = document.getElementById('fAlamat');
  var on   = lok === 'Kota Medan';
  if (on) { wrap.classList.remove('hidden'); inp.required = true; }
  else    { wrap.classList.add('hidden');    inp.required = false; inp.value = ''; }
}

function calcEst() {
  var s = document.getElementById('fStart').value;
  var e = document.getElementById('fEnd').value;
  if (!s || !e) return;
  var days = Math.ceil((new Date(e+'T00:00:00') - new Date(s+'T00:00:00')) / 86400000) + 1;
  if (days <= 0) return;
  var total = CARS[selectedCar].price * days;
  document.getElementById('estBox').classList.remove('hidden');
  document.getElementById('estTxt').textContent    = fmt(total);
  document.getElementById('estDetail').textContent = days + ' hari × ' + fmt(CARS[selectedCar].price) + '/hari';
}

function copyLink() {
  if (!lastBookingId) return;
  navigator.clipboard.writeText(trackLink(lastBookingId))
    .then(function(){ document.getElementById('oCopy').textContent = '✓ Link Berhasil Disalin!'; });
}
function goTrack()     { if (lastBookingId) window.location.href = trackLink(lastBookingId); }
function closeOverlay(){ document.getElementById('overlay').classList.remove('show'); document.getElementById('oCopy').textContent = '📋 Salin Link Tracking'; }

// ════════════════════════════════════════════════
// SUBMIT FORM
// ════════════════════════════════════════════════
document.getElementById('bForm').addEventListener('submit', function(e) {
  e.preventDefault();
  var btn     = document.getElementById('submitBtn');
  var btnText = document.getElementById('btnText');
  btn.disabled = true;
  btnText.textContent = '⏳ Menyimpan...';

  var s    = document.getElementById('fStart').value;
  var en   = document.getElementById('fEnd').value;
  var days = Math.ceil((new Date(en+'T00:00:00') - new Date(s+'T00:00:00')) / 86400000) + 1;

  if (days <= 0) {
    alert('Tanggal pengembalian harus sama atau setelah tanggal penjemputan!');
    btn.disabled = false; btnText.textContent = '🚀 PESAN SEKARANG → KIRIM KE WHATSAPP';
    return;
  }

  var car    = CARS[selectedCar];
  var lokasi = document.getElementById('fLok').value;
  var alamat = document.getElementById('fAlamat').value;
  var lokasiLengkap = (lokasi === 'Kota Medan' && alamat) ? lokasi + ' - ' + alamat : lokasi;

  var now = new Date();
  var bookingId = 'DZ' + now.getFullYear() + String(now.getMonth()+1).padStart(2,'0') + '-' + Math.random().toString(36).substr(2,6).toUpperCase();

  var data = {
    id: bookingId,
    nama: document.getElementById('fNama').value,
    wa:   document.getElementById('fWa').value,
    email: document.getElementById('fEmail').value || null,
    ktp:   document.getElementById('fKtp').value   || null,
    car: selectedCar, car_label: car.label,
    with_driver: driverMode === 0,
    start_date: s, end_date: en,
    waktu:  document.getElementById('fWkt').value,
    lokasi: lokasiLengkap,
    catatan: document.getElementById('fCt').value || '-',
    days: days, car_price: car.price, total_price: car.price * days,
    status: 'pending', payment_status: 'unpaid',
    driver_name: null, driver_phone: null, vehicle_plate: null,
    payment_method: null, invoice_url: null,
    tipe_pesanan: 'rental', car_photos: [],
    created_at: now.toISOString()
  };

  // Simpan ke Firestore jika sudah dikonfigurasi
  var savePromise = (isConfigured && db)
    ? db.collection('bookings').doc(bookingId).set(data).catch(function(e){ console.error('Firestore save:', e); })
    : Promise.resolve();

  savePromise.then(function() {
    lastBookingId = bookingId;

    // Kirim WhatsApp
    var link = trackLink(bookingId);
    var msg = '🚗 *BOOKING BARU — Drive Zone*\n━━━━━━━━━━━━━━━━━━━━━\n'
      + '🔖 *ID Pesanan: ' + bookingId + '*\n\n'
      + '👤 *DATA PENYEWA*\n'
      + '• Nama        : ' + data.nama + '\n'
      + '• No. WA      : ' + data.wa + '\n'
      + '• Email       : ' + (data.email||'-') + '\n'
      + '• No. KTP/SIM : ' + (data.ktp||'-') + '\n\n'
      + '🚙 *KENDARAAN*\n'
      + '• Mobil       : ' + car.label + '\n'
      + '• Pengemudi   : ' + (driverMode===0?'Dengan Supir (Gratis)':'Lepas Kunci (Mandiri)') + '\n\n'
      + '📅 *DETAIL SEWA*\n'
      + '• Penjemputan : ' + fmtD(s) + ' pukul ' + data.waktu + '\n'
      + '• Pengembalian: ' + fmtD(en) + '\n'
      + '• Durasi      : ' + days + ' hari\n'
      + '• Lokasi      : ' + lokasiLengkap + '\n\n'
      + '💰 *TOTAL: ' + fmt(car.price * days) + '*\n\n'
      + '📝 *CATATAN*\n' + data.catatan + '\n\n'
      + '🔗 *Link Tracking:*\n' + link + '\n━━━━━━━━━━━━━━━━━━━━━';

    window.open('https://wa.me/' + WA_NUMBER + '?text=' + encodeURIComponent(msg), '_blank');

    document.getElementById('oId').textContent = bookingId;
    document.getElementById('overlay').classList.add('show');

    // Reset form
    document.getElementById('bForm').reset();
